<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IA Humana — Base de Conocimiento</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #ffffff0f;
      --border-hover: #ffffff22;
      --accent: #7c6aff;
      --accent-soft: #7c6aff18;
      --accent-glow: #7c6aff40;
      --green: #4ade80;
      --green-soft: #4ade8018;
      --amber: #fbbf24;
      --amber-soft: #fbbf2418;
      --red: #f87171;
      --red-soft: #f8717118;
      --cyan: #22d3ee;
      --cyan-soft: #22d3ee18;
      --text: #e8e8f0;
      --text-muted: #7878a0;
      --text-dim: #4a4a6a;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NOISE TEXTURE */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0f0f1a 0%, transparent 100%);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-add {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      transition: all 0.2s;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .btn-add:active { transform: scale(0.92); }

    /* SEARCH */
    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
    }

    .search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px 9px 34px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search::placeholder { color: var(--text-dim); }
    .search:focus { border-color: var(--accent); }

    /* NAV TABS */
    .nav {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav-tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-tab.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .nav-tab:active { opacity: 0.7; }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 16px 20px 100px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      margin-top: 20px;
    }

    .section-title:first-child { margin-top: 4px; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
    }

    .stat-number {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 24px;
      color: var(--accent);
      display: block;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* PHASE CARDS */
    .phase-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .phase-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .phase-card[data-color="purple"]::before { background: var(--accent); }
    .phase-card[data-color="green"]::before { background: var(--green); }
    .phase-card[data-color="amber"]::before { background: var(--amber); }
    .phase-card[data-color="cyan"]::before { background: var(--cyan); }
    .phase-card[data-color="red"]::before { background: var(--red); }

    .phase-card:active { transform: scale(0.98); border-color: var(--border-hover); }

    .phase-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .phase-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      font-family: 'Syne', sans-serif;
    }

    .phase-card[data-color="purple"] .phase-badge { background: var(--accent-soft); color: var(--accent); }
    .phase-card[data-color="green"] .phase-badge { background: var(--green-soft); color: var(--green); }
    .phase-card[data-color="amber"] .phase-badge { background: var(--amber-soft); color: var(--amber); }
    .phase-card[data-color="cyan"] .phase-badge { background: var(--cyan-soft); color: var(--cyan); }
    .phase-card[data-color="red"] .phase-badge { background: var(--red-soft); color: var(--red); }

    .phase-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      flex: 1;
    }

    .phase-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    .phase-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .phase-count {
      font-size: 12px;
      color: var(--text-dim);
    }

    .phase-arrow {
      margin-left: auto;
      color: var(--accent);
      font-size: 16px;
    }

    /* KNOWLEDGE CARDS */
    .knowledge-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .knowledge-card:active { transform: scale(0.98); }

    .card-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .card-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 5px;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.3px;
    }

    .tag-purple { background: var(--accent-soft); color: var(--accent); }
    .tag-green { background: var(--green-soft); color: var(--green); }
    .tag-amber { background: var(--amber-soft); color: var(--amber); }
    .tag-cyan { background: var(--cyan-soft); color: var(--cyan); }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-summary {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .card-date {
      font-size: 11px;
      color: var(--text-dim);
    }

    .card-expand {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    /* MODAL - FULL CARD VIEW */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: flex-end;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 24px 20px 40px;
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border-hover);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .modal-body {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .modal-body h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 20px;
      margin-bottom: 8px;
    }

    .modal-body p { margin-bottom: 10px; }
    .modal-body ul { padding-left: 18px; }
    .modal-body li { margin-bottom: 5px; }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ADD CARD MODAL */
    .add-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 300;
      display: none;
      align-items: flex-end;
      backdrop-filter: blur(4px);
    }

    .add-modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

    .add-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 24px 20px 40px;
    }

    .form-label {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      display: block;
      margin-bottom: 7px;
      margin-top: 16px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-textarea {
      resize: none;
      min-height: 120px;
      line-height: 1.6;
    }

    .form-select option { background: var(--card); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      border: none;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .btn-submit:active { transform: scale(0.98); opacity: 0.9; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .empty-desc { font-size: 13px; line-height: 1.5; }

    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    /* PROGRESS BAR */
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .phase-card[data-color="purple"] .progress-fill { background: var(--accent); }
    .phase-card[data-color="green"] .progress-fill { background: var(--green); }
    .phase-card[data-color="amber"] .progress-fill { background: var(--amber); }
    .phase-card[data-color="cyan"] .progress-fill { background: var(--cyan); }
    .phase-card[data-color="red"] .progress-fill { background: var(--red); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo">IA<span>Humana</span> — Conocimiento</div>
      <button class="btn-add" id="btnAdd" onclick="openAddModal()">+</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search" type="text" placeholder="Buscar tarjeta..." oninput="handleSearch(this.value)" />
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="nav" id="navTabs">
    <button class="nav-tab active" onclick="switchTab('home', this)">Inicio</button>
    <button class="nav-tab" onclick="switchTab('fase1', this)">Fase 1</button>
    <button class="nav-tab" onclick="switchTab('fase2', this)">Fase 2</button>
    <button class="nav-tab" onclick="switchTab('fase3', this)">Fase 3</button>
    <button class="nav-tab" onclick="switchTab('fase4', this)">Fase 4</button>
    <button class="nav-tab" onclick="switchTab('general', this)">General</button>
  </div>

  <!-- CONTENT -->
  <div class="content" id="mainContent"></div>

</div>

<!-- CARD MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ADD CARD MODAL -->
<div class="add-modal-overlay" id="addModalOverlay" onclick="closeAddModal(event)">
  <div class="add-modal">
    <div class="modal-handle"></div>
    <div class="modal-title" style="font-size:18px; margin-bottom:4px;">Nueva tarjeta</div>
    <p style="font-size:13px; color:var(--text-dim); margin-bottom:4px;">Añade lo que aprendiste hoy</p>

    <label class="form-label">Título</label>
    <input class="form-input" id="inputTitle" type="text" placeholder="¿Qué aprendiste?" />

    <label class="form-label">Resumen corto</label>
    <input class="form-input" id="inputSummary" type="text" placeholder="Una línea que explique la idea central" />

    <label class="form-label">Contenido completo</label>
    <textarea class="form-textarea" id="inputBody" placeholder="Explícalo con tus propias palabras..."></textarea>

    <label class="form-label">Fase</label>
    <select class="form-select" id="inputPhase">
      <option value="fase1">Fase 1 — Entender la máquina</option>
      <option value="fase2">Fase 2 — Prompting con criterio</option>
      <option value="fase3">Fase 3 — IA como sistema de trabajo</option>
      <option value="fase4">Fase 4 — Construir con IA</option>
      <option value="general">General</option>
    </select>

    <label class="form-label">Archivo HTML <span style="color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
    <input class="form-input" id="inputUrl" type="text" placeholder="tarjeta-fase1-llm.html" />

    <button class="btn-submit" onclick="saveCard()">Guardar tarjeta</button>
  </div>
</div>

<script>
  // ─── TELEGRAM WEB APP INIT ─────────────────────────────────────────────
  const OWNER_ID = 8662185093;
  let isOwner = false;

  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
    const user = window.Telegram.WebApp.initDataUnsafe?.user;
    if (user && user.id === OWNER_ID) isOwner = true;
  }

  // ─── DATA ──────────────────────────────────────────────────────────────
  const PHASES = [
    {
      id: 'fase1',
      label: 'FASE 1',
      title: 'Entender la máquina',
      desc: 'Cómo funciona realmente un LLM: tokens, contexto, temperatura, alucinaciones y límites estructurales.',
      color: 'purple'
    },
    {
      id: 'fase2',
      label: 'FASE 2',
      title: 'Prompting con criterio',
      desc: 'Sistema para obtener resultados consistentes y superiores de cualquier modelo de IA.',
      color: 'green'
    },
    {
      id: 'fase3',
      label: 'FASE 3',
      title: 'IA como sistema de trabajo',
      desc: 'Integrar IA como capa de amplificación real en trading, negocios y aprendizaje.',
      color: 'amber'
    },
    {
      id: 'fase4',
      label: 'FASE 4',
      title: 'Construir con IA',
      desc: 'Pasar de usuario avanzado a constructor: APIs, agentes, RAG y herramientas propias.',
      color: 'cyan'
    }
  ];

  const TAG_COLORS = {
    fase1: 'tag-purple',
    fase2: 'tag-green',
    fase3: 'tag-amber',
    fase4: 'tag-cyan',
    general: 'tag-cyan'
  };

  const TAG_LABELS = {
    fase1: 'Fase 1',
    fase2: 'Fase 2',
    fase3: 'Fase 3',
    fase4: 'Fase 4',
    general: 'General'
  };

  let cards = [];
  let currentTab = 'home';
  let searchQuery = '';

  function loadCards() {
    try {
      cards = JSON.parse(localStorage.getItem('ia_cards') || '[]');
    } catch { cards = []; }
  }

  function saveCards() {
    localStorage.setItem('ia_cards', JSON.stringify(cards));
  }

  function countByPhase(phaseId) {
    return cards.filter(c => c.phase === phaseId).length;
  }

  // ─── RENDER ────────────────────────────────────────────────────────────
  function render() {
    const el = document.getElementById('mainContent');
    el.innerHTML = '';
    el.classList.add('fade-in');
    setTimeout(() => el.classList.remove('fade-in'), 300);

    if (searchQuery) {
      renderSearch(el);
      return;
    }

    if (currentTab === 'home') renderHome(el);
    else renderPhase(el, currentTab);
  }

  function renderHome(el) {
    const total = cards.length;
    const completed = PHASES.filter(p => countByPhase(p.id) > 0).length;

    el.innerHTML = `
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-number">${total}</span>
          <span class="stat-label">Tarjetas</span>
        </div>
        <div class="stat-card">
          <span class="stat-number">${completed}</span>
          <span class="stat-label">Fases activas</span>
        </div>
        <div class="stat-card">
          <span class="stat-number">${PHASES.length}</span>
          <span class="stat-label">Fases totales</span>
        </div>
      </div>

      <p class="section-title">Tu ruta</p>
      ${PHASES.map(p => renderPhaseCard(p)).join('')}
    `;
  }

  function renderPhaseCard(p) {
    const count = countByPhase(p.id);
    const progress = Math.min(count * 20, 100);
    return `
      <div class="phase-card" data-color="${p.color}" onclick="switchTabById('${p.id}')">
        <div class="phase-header">
          <div class="phase-title">${p.title}</div>
          <span class="phase-badge">${p.label}</span>
        </div>
        <p class="phase-desc">${p.desc}</p>
        <div class="phase-meta">
          <span class="phase-count">${count} tarjeta${count !== 1 ? 's' : ''}</span>
          <span class="phase-arrow">→</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${count > 0 ? Math.max(progress, 8) : 0}%"></div>
        </div>
      </div>
    `;
  }

  function renderPhase(el, phaseId) {
    const filtered = cards.filter(c => c.phase === phaseId);
    const phase = PHASES.find(p => p.id === phaseId);
    const label = phase ? phase.title : 'General';

    if (filtered.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📭</span>
          <div class="empty-title">Sin tarjetas aún</div>
          <p class="empty-desc">Completa la ${label.toLowerCase()} y<br>añade lo que aprendiste aquí.</p>
        </div>
      `;
      return;
    }

    el.innerHTML = `
      <p class="section-title">${label}</p>
      ${filtered.map((c, i) => renderCardItem(c, i)).join('')}
    `;
  }

  function renderCardItem(card, globalIndex) {
    const idx = cards.indexOf(card);
    return `
      <div class="knowledge-card" onclick="openCard(${idx})">
        <div class="card-tag-row">
          <span class="card-tag ${TAG_COLORS[card.phase] || 'tag-purple'}">${TAG_LABELS[card.phase] || card.phase}</span>
        </div>
        <div class="card-title">${escHtml(card.title)}</div>
        <div class="card-summary">${escHtml(card.summary)}</div>
        <div class="card-footer">
          <span class="card-date">${card.date}</span>
          <span class="card-expand">${card.url ? '📄 Ver completa →' : 'Leer →'}</span>
        </div>
      </div>
    `;
  }

  function renderSearch(el) {
    const q = searchQuery.toLowerCase();
    const results = cards.filter(c =>
      c.title.toLowerCase().includes(q) ||
      c.summary.toLowerCase().includes(q) ||
      (c.body || '').toLowerCase().includes(q)
    );

    if (results.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">🔍</span>
          <div class="empty-title">Sin resultados</div>
          <p class="empty-desc">No encontramos nada para "${escHtml(searchQuery)}"</p>
        </div>
      `;
      return;
    }

    el.innerHTML = `
      <p class="section-title">${results.length} resultado${results.length !== 1 ? 's' : ''}</p>
      ${results.map(c => renderCardItem(c, cards.indexOf(c))).join('')}
    `;
  }

  // ─── CARD MODAL ────────────────────────────────────────────────────────
  function openCard(idx) {
    const card = cards[idx];
    if (!card) return;

    const body = (card.body || card.summary || '').replace(/\n/g, '<br>');
    const fullCardBtn = card.url
      ? `<a href="${escHtml(card.url)}" target="_blank"
           style="display:block; margin-top:18px; padding:13px; background:var(--accent-soft);
                  border:1px solid var(--accent); border-radius:10px; color:var(--accent);
                  font-family:'Syne',sans-serif; font-weight:700; font-size:14px;
                  text-align:center; text-decoration:none;">
           Ver tarjeta completa →
         </a>`
      : '';

    document.getElementById('modalBody').innerHTML = `
      <div class="modal-tags">
        <span class="card-tag ${TAG_COLORS[card.phase] || 'tag-purple'}">${TAG_LABELS[card.phase] || card.phase}</span>
      </div>
      <div class="modal-title">${escHtml(card.title)}</div>
      <div class="modal-body">
        <h3>Resumen</h3>
        <p>${escHtml(card.summary)}</p>
        ${card.body ? `<h3>Detalle</h3><p>${body}</p>` : ''}
        <p style="font-size:11px; color:var(--text-dim); margin-top:20px;">Guardado el ${card.date}</p>
      </div>
      ${fullCardBtn}
    `;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('open');
  }

  function closeModalBtn() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  // ─── ADD MODAL ────────────────────────────────────────────────────────
  function openAddModal() {
    document.getElementById('addModalOverlay').classList.add('open');
    document.getElementById('inputPhase').value = currentTab !== 'home' ? currentTab : 'fase1';
  }

  function closeAddModal(e) {
    if (e.target === document.getElementById('addModalOverlay'))
      document.getElementById('addModalOverlay').classList.remove('open');
  }

  function saveCard() {
    if (!isOwner) return;
    const title = document.getElementById('inputTitle').value.trim();
    const summary = document.getElementById('inputSummary').value.trim();
    const body = document.getElementById('inputBody').value.trim();
    const phase = document.getElementById('inputPhase').value;
    const url = document.getElementById('inputUrl').value.trim();

    if (!title || !summary) return alert('El título y el resumen son obligatorios.');

    const today = new Date().toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });

    cards.unshift({ title, summary, body, phase, url, date: today });
    saveCards();

    document.getElementById('inputTitle').value = '';
    document.getElementById('inputSummary').value = '';
    document.getElementById('inputBody').value = '';
    document.getElementById('inputUrl').value = '';
    document.getElementById('addModalOverlay').classList.remove('open');

    if (currentTab === 'home' || currentTab === phase) render();
    else switchTabById(phase);
  }

  // ─── NAVIGATION ────────────────────────────────────────────────────────
  function switchTab(tab, btn) {
    currentTab = tab;
    searchQuery = '';
    document.querySelector('.search').value = '';
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function switchTabById(tab) {
    currentTab = tab;
    const tabs = ['home','fase1','fase2','fase3','fase4','general'];
    const idx = tabs.indexOf(tab);
    const btns = document.querySelectorAll('.nav-tab');
    btns.forEach(t => t.classList.remove('active'));
    if (btns[idx]) btns[idx].classList.add('active');
    render();
  }

  function handleSearch(val) {
    searchQuery = val;
    render();
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── INIT ──────────────────────────────────────────────────────────────
  loadCards();
  if (!isOwner) document.getElementById('btnAdd').style.display = 'none';
  render();
</script>
</body>
</html>
